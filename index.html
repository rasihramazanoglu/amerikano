          position: fixed; inset: 0; z-index: 9999;
          display: flex; align-items: center; justify-content: center;
          background: #071c0f; color: #d4a017;
          font-family: Georgia, serif; font-size: 18px; text-align: center;
          padding: 20px;
        }
